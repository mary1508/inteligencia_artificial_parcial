<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GA Walker — Algoritmo Genético</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0e17;
    --surface:  #111827;
    --panel:    #161e2e;
    --border:   #1f2d45;
    --accent:   #00e5ff;
    --green:    #39ff6e;
    --orange:   #ff7c3a;
    --purple:   #a855f7;
    --red:      #ff4757;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --floor:    #1a2540;
    --sky1:     #0d1526;
    --sky2:     #0a1a3a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,23,0.9);
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem; }
  .logo span { color: var(--accent); }
  .badge {
    font-size: .65rem; padding: 3px 10px;
    border: 1px solid var(--accent); color: var(--accent);
    border-radius: 999px; letter-spacing: .1em;
  }

  /* ── Layout ── */
  .main { display: grid; grid-template-columns: 300px 1fr; gap: 0; height: calc(100vh - 57px); }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 20px;
  }
  .section-title {
    font-family: 'Syne', sans-serif; font-size: .7rem;
    letter-spacing: .15em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .param-group { display: flex; flex-direction: column; gap: 12px; }
  .param-row label {
    display: flex; justify-content: space-between;
    font-size: .72rem; color: var(--muted); margin-bottom: 5px;
  }
  .param-row label span { color: var(--accent); font-weight: 700; }
  input[type=range] {
    width: 100%; accent-color: var(--accent);
    cursor: pointer;
  }
  select, input[type=number] {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 7px 10px; border-radius: 6px;
    font-family: inherit; font-size: .78rem;
  }

  .btn {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    font-family: 'Syne', sans-serif; font-weight: 700; font-size: .85rem;
    cursor: pointer; transition: all .2s; letter-spacing: .05em;
  }
  .btn-run {
    background: var(--accent); color: var(--bg);
  }
  .btn-run:hover { filter: brightness(1.2); transform: translateY(-1px); }
  .btn-run:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-replay {
    background: transparent; border: 1px solid var(--green); color: var(--green);
    margin-top: 4px;
  }
  .btn-replay:hover { background: rgba(57,255,110,.08); }
  .btn-replay:disabled { opacity: .3; cursor: not-allowed; }

  /* ── Stats cards ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px;
  }
  .stat-label { font-size: .6rem; color: var(--muted); letter-spacing: .1em; }
  .stat-value {
    font-family: 'Syne', sans-serif; font-size: 1.1rem;
    font-weight: 700; color: var(--accent); margin-top: 2px;
  }
  .stat-value.green { color: var(--green); }
  .stat-value.orange { color: var(--orange); }
  .stat-value.purple { color: var(--purple); }

  /* ── Log ── */
  .log {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; height: 140px; overflow-y: auto;
    font-size: .65rem; color: var(--muted); line-height: 1.6;
  }
  .log .gen  { color: var(--accent); }
  .log .fit  { color: var(--green); }
  .log .done { color: var(--orange); font-weight: bold; }

  /* ── Right panel ── */
  .right { display: flex; flex-direction: column; overflow: hidden; }

  /* ── Canvas world ── */
  .world-wrapper {
    position: relative; flex: 0 0 auto;
    background: linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 60%, #0d1c38 100%);
    border-bottom: 1px solid var(--border);
    overflow: hidden; height: 420px;
  }
  #worldCanvas { display: block; width: 100%; height: 100%; }

  .gen-badge {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.6); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 16px;
    font-size: .7rem; color: var(--muted); letter-spacing: .1em;
    pointer-events: none;
  }
  .gen-badge span { color: var(--accent); font-weight: 700; }

  /* progress bar */
  .progress-wrap {
    height: 3px; background: var(--border);
    position: absolute; bottom: 0; left: 0; right: 0;
  }
  #progressBar { height: 100%; background: var(--accent); width: 0%; transition: width .3s; }

  /* ── Chart section ── */
  .chart-section {
    flex: 1; padding: 20px; overflow-y: auto;
    display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  }
  .chart-card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 16px;
  }
  .chart-card h3 {
    font-family: 'Syne', sans-serif; font-size: .75rem;
    color: var(--muted); text-transform: uppercase; letter-spacing: .1em;
    margin-bottom: 12px;
  }
  canvas.chart { width: 100% !important; height: 160px !important; }

  /* Popup toast */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface); border: 1px solid var(--green);
    color: var(--green); padding: 12px 20px; border-radius: 8px;
    font-size: .75rem; opacity: 0; transform: translateY(10px);
    transition: all .3s; pointer-events: none; z-index: 200;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">GA<span>Walker</span></div>
  <div style="display:flex;gap:10px;align-items:center">
    <span id="statusDot" style="width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block"></span>
    <span id="statusText" style="font-size:.7rem;color:var(--muted)">IDLE</span>
  </div>
  <div class="badge">ALGORITMO GENÉTICO</div>
</header>

<div class="main">
  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div>
      <div class="section-title">⚙ Parámetros</div>
      <div class="param-group">
        <div class="param-row">
          <label>Generaciones <span id="genVal">1000</span></label>
          <input type="range" id="generations" min="100" max="2000" value="1000" step="50"
                 oninput="document.getElementById('genVal').textContent=this.value">
        </div>
        <div class="param-row">
          <label>Población <span id="popVal">60</span></label>
          <input type="range" id="pop_size" min="20" max="200" value="60" step="10"
                 oninput="document.getElementById('popVal').textContent=this.value">
        </div>
        <div class="param-row">
          <label>Tasa Mutación <span id="mutVal">0.15</span></label>
          <input type="range" id="mutation_rate" min="0.01" max="0.5" value="0.15" step="0.01"
                 oninput="document.getElementById('mutVal').textContent=parseFloat(this.value).toFixed(2)">
        </div>
        <div class="param-row">
          <label>Élite <span id="elVal">15%</span></label>
          <input type="range" id="elite_size" min="0.05" max="0.4" value="0.15" step="0.05"
                 oninput="document.getElementById('elVal').textContent=Math.round(this.value*100)+'%'">
        </div>
        <div class="param-row">
          <label>Velocidad reproducción <span id="playbackVal">60ms</span></label>
          <input type="range" id="playback_delay" min="8" max="200" value="60" step="4"
                 oninput="document.getElementById('playbackVal').textContent=this.value+'ms'; if(window.setFrameDelay) setFrameDelay(this.value)">
        </div>
      </div>
    </div>

    <button class="btn btn-run" id="btnRun" onclick="startGA()">▶ INICIAR EVOLUCIÓN</button>
    <button class="btn btn-replay" id="btnReplay" onclick="replayBest()" disabled>⟳ REPRODUCIR MEJOR</button>

    <div>
      <div class="section-title">📊 Métricas</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">GENERACIÓN</div>
          <div class="stat-value" id="mGen">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">MEJOR FITNESS</div>
          <div class="stat-value green" id="mFit">—</div>
        </div>
        <div style="height:8px"></div>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">SALTOS</div>
            <div class="stat-value" id="mJumps">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">OBSTÁCULOS SALTADOS</div>
            <div class="stat-value" id="mClear">—</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">DISTANCIA MAX</div>
          <div class="stat-value orange" id="mDist">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">COLISIONES</div>
          <div class="stat-value purple" id="mColl">—</div>
        </div>
      </div>
    </div>

    <div>
      <div class="section-title">📋 Log</div>
      <div class="log" id="logBox"></div>
    </div>
  </aside>

  <!-- ── Right panel ── -->
  <div class="right">
    <!-- World canvas -->
    <div class="world-wrapper">
      <canvas id="worldCanvas"></canvas>
      <div class="gen-badge">Generación <span id="genLabel">—</span></div>
      <div class="progress-wrap"><div id="progressBar"></div></div>
    </div>

    <!-- Charts -->
    <div class="chart-section">
      <div class="chart-card">
        <h3>Fitness por generación</h3>
        <canvas id="chartFitness" class="chart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Fitness promedio vs mejor</h3>
        <canvas id="chartAvg" class="chart"></canvas>
      </div>
    </div>
  </div>
</div>

<div id="toast">✓ Evolución completada</div>

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="/static/world.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
